<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row">
            <div class="col-xs-12">
                <h3 class="panel-title col-xs-12">{{ contact?.name }}</h3>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12">
                <img [src]="contact?.imageUrl" alt="{{ contact?.name }}" class="img-responsive" style="max-width: 50px;">
                <button class="btn btn-danger pull-right">Delete</button>
                <button class="btn btn-primary pull-right">Edit</button>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-xs-12">
                <p>Email: {{ contact?.email}}</p>
                <p>Phone: {{ contact?.phone}}</p>
            </div>
        </div>
    </div>
</div>
