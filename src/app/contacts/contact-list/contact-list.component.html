<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row vcenter">
            <div class="col-xs-4 col-sm-6">
                <h3 class="panel-title">Contacts</h3>
            </div>
            <div class="col-xs-6 col-xs-offset-1 col-sm-4 col-sm-offset-2 col-md-offset-3">
                <a class="btn btn-success pull-right" routerLink="new">New Contact</a>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <!-- Iterate through each group -->
        <div *ngFor="let group of groupedContacts">
            <h4>{{ group.name }}</h4>
            <!--the drag and drop element-->
            <div class="row">
                <cms-contact-item
                    *ngFor="let contact of group.members"
                    [contact]="contact"
                    cdkDrag
                    [cdkDragData]="contact">
                </cms-contact-item>
            </div>
        </div>
    </div>
</div>
