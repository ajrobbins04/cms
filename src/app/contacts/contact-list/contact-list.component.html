<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row vcenter">
            <div class="col-xs-4 col-sm-6">
                <h3 class="panel-title">Contacts</h3>
            </div>
            <div class="col-xs-6 col-xs-offset-1 col-sm-4 col-sm-offset-2 col-md-offset-3">
                <button class="btn btn-success pull-right">New Contact</button>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="list-group">
            <cms-contact-item
                *ngFor="let contactEl of contacts"
                [contact]="contactEl"
                (click)="onSelectedContact(contactEl)"></cms-contact-item>
        </div>
    </div>
</div>
