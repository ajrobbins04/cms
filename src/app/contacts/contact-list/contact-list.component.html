<div class="panel panel-default">
    <div class="panel-heading">
        <div class="row vcenter">
            <div class="col-xs-4 col-sm-6">
                <h3 class="panel-title">Contacts</h3>
            </div>
            <div class="col-xs-6 col-xs-offset-1 col-sm-4 col-sm-offset-2 col-md-offset-3">
                <a class="btn btn-success pull-right" routerLink="new">New Contact</a>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div 
            class="row"
            cdkDropList
            [cdkDropListData]="contacts" >
            <!--the draggable element-->
            <cms-contact-item
                *ngFor="let contact of contacts"
                [contact]="contact"
                cdkDropList
                [cdkDropListData]="contact">
            </cms-contact-item>
        </div>
    </div>
</div>
